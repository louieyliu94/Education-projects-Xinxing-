<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Recreation of the Xinxing School seal mark (red starfish with concentric
    square stamps inside each limb). For the highest-fidelity version, replace
    this file with the school's official logo asset.
  -->
  <g stroke="#C8412B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- HEAD (top) -->
    <g transform="translate(100, 30)">
      <path d="M 0 -16 L 7 -4 L 0 6 L -7 -4 Z" />
      <rect x="-5" y="-6" width="10" height="10" rx="2" />
      <rect x="-2.5" y="-3.5" width="5" height="5" rx="1" />
    </g>

    <!-- LEFT ARM -->
    <g transform="translate(40, 70)">
      <path d="M 20 -2 C 15 -8, 6 -10, 0 -4" />
      <path d="M 20 6 C 15 12, 6 14, 0 8" />
      <rect x="-18" y="-12" width="22" height="24" rx="4" />
      <rect x="-14" y="-8" width="14" height="16" rx="3" />
      <rect x="-10" y="-4" width="6" height="8" rx="1.5" />
    </g>

    <!-- RIGHT ARM (mirror) -->
    <g transform="translate(160, 70)">
      <path d="M -20 -2 C -15 -8, -6 -10, 0 -4" />
      <path d="M -20 6 C -15 12, -6 14, 0 8" />
      <rect x="-4" y="-12" width="22" height="24" rx="4" />
      <rect x="0" y="-8" width="14" height="16" rx="3" />
      <rect x="4" y="-4" width="6" height="8" rx="1.5" />
    </g>

    <!-- LEFT LEG -->
    <g transform="translate(48, 158)">
      <path d="M 16 -22 C 8 -16, 4 -8, 0 0" />
      <path d="M 22 -18 C 14 -10, 8 -4, 4 4" />
      <rect x="-14" y="-8" width="22" height="22" rx="4" />
      <rect x="-10" y="-4" width="14" height="14" rx="3" />
      <rect x="-6" y="0" width="6" height="6" rx="1.5" />
    </g>

    <!-- RIGHT LEG (mirror) -->
    <g transform="translate(152, 158)">
      <path d="M -16 -22 C -8 -16, -4 -8, 0 0" />
      <path d="M -22 -18 C -14 -10, -8 -4, -4 4" />
      <rect x="-8" y="-8" width="22" height="22" rx="4" />
      <rect x="-4" y="-4" width="14" height="14" rx="3" />
      <rect x="0" y="0" width="6" height="6" rx="1.5" />
    </g>

    <!-- CENTRAL BODY — vertical concentric stamps -->
    <g transform="translate(100, 105)">
      <rect x="-10" y="-26" width="20" height="52" rx="4" />
      <rect x="-6" y="-22" width="12" height="44" rx="3" />
      <rect x="-3" y="-18" width="6" height="36" rx="1.5" />
    </g>

    <!-- Connecting limb lines into central body -->
    <path d="M 22 70 L 90 95" />
    <path d="M 178 70 L 110 95" />
    <path d="M 100 50 L 100 79" />
    <path d="M 50 158 L 92 130" />
    <path d="M 150 158 L 108 130" />
  </g>
</svg>
